version: 2
updates:
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: monthly
      time: "09:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - apps/web
    groups:
      next:
        patterns: ["next", "eslint-config-next", "@next/*"]
      react:
        patterns: ["react", "react-dom", "@types/react", "@types/react-dom"]
      tailwind:
        patterns: ["tailwindcss", "@tailwindcss/*", "postcss"]
      types:
        patterns: ["@types/*"]
      supabase:
        patterns: ["@supabase/*"]
    ignore:
      # Major do Next e uma migracao deliberada (muda build, remove `next lint`),
      # nao um bump de rotina. Fazemos manualmente quando houver tempo; sem isso
      # o dependabot reabre o PR vermelho do Next 16 todo mes.
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint-config-next"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: docker
    directory: /apps/web
    schedule:
      interval: monthly
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - docker

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - ci
    groups:
      # Um PR unico com todos os bumps de actions em vez de 5 separados.
      actions:
        patterns: ["*"]
