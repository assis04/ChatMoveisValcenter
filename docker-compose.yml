services:
  # ─── PostgreSQL (Chatwoot) ───────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: chatcenter_postgres
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: chatwoot_production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - chatcenter

  # ─── Redis (Chatwoot + Evolution) ────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: chatcenter_redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 192M
    networks:
      - chatcenter

  # ─── Chatwoot (Web) ──────────────────────────────────────────
  chatwoot-web:
    image: ghcr.io/assis04/chatwoot:chatcenter-v4.14.0-search@sha256:b53e3ab70ac05e87778ec3a19d9212332256f1a87e8f7bb8a69aabedd0c15f54
    container_name: chatcenter_chatwoot_web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      RAILS_ENV: production
      INSTALLATION_ENV: docker
      NODE_ENV: production
    volumes:
      - chatwoot_storage:/app/storage
      - ./infra/chatwoot/audio_opus_inline.rb:/app/config/initializers/zz_audio_opus_inline.rb:ro
    entrypoint: docker/entrypoints/rails.sh
    command: ['bundle', 'exec', 'rails', 's', '-p', '3000', '-b', '0.0.0.0']
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - chatcenter

  # ─── Chatwoot (Sidekiq — background jobs) ────────────────────
  chatwoot-sidekiq:
    image: ghcr.io/assis04/chatwoot:chatcenter-v4.14.0-search@sha256:b53e3ab70ac05e87778ec3a19d9212332256f1a87e8f7bb8a69aabedd0c15f54
    container_name: chatcenter_chatwoot_sidekiq
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      RAILS_ENV: production
      INSTALLATION_ENV: docker
      NODE_ENV: production
    volumes:
      - chatwoot_storage:/app/storage
    command: ['bundle', 'exec', 'sidekiq', '-C', 'config/sidekiq.yml']
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - chatcenter

  # ─── Evolution API (WhatsApp bridge) ─────────────────────────
  # Note: no `ports:` block on purpose — Evolution is only reachable through
  # nginx at https://chat.moveisvalcenter.com.br/evolution/. Internally,
  # other containers reach it via `evolution:8080` on the chatcenter_net
  # network. Exposing 8080 directly on the host would bypass TLS and the
  # nginx rate-limits.
  evolution:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: chatcenter_evolution
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      SERVER_URL: https://${DOMAIN}/evolution
      SERVER_PORT: 8080
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/evolution_db
      DATABASE_SAVE_DATA_INSTANCE: true
      DATABASE_SAVE_DATA_NEW_MESSAGE: true
      DATABASE_SAVE_DATA_CONTACTS: true
      CACHE_REDIS_ENABLED: true
      CACHE_REDIS_URI: redis://redis:6379/1
      CACHE_LOCAL_ENABLED: false
      LOG_LEVEL: ERROR,WARN,INFO
      CHATWOOT_ENABLED: true
      CHATWOOT_MESSAGE_READ: true
      CHATWOOT_MESSAGE_DELETE: true
      CHATWOOT_IMPORT_DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/chatwoot_production?sslmode=disable
      CHATWOOT_IMPORT_PLACEHOLDER_MEDIA_MESSAGE: true
    deploy:
      resources:
        limits:
          memory: 384M
    networks:
      - chatcenter

  # ─── Next.js App (Dashboard Apps + API custom) ───────────────
  app:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    image: chatcenter-app:latest
    container_name: chatcenter_app
    restart: unless-stopped
    env_file: ./apps/web/.env.production
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - chatcenter

  # ─── Nginx (reverse proxy + SSL) ─────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: chatcenter_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - chatwoot-web
      - app
      - evolution
    networks:
      - chatcenter

  # ─── Certbot (SSL auto-renewal) ──────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: chatcenter_certbot
    volumes:
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - chatcenter

volumes:
  postgres_data:
    name: chatcenter_postgres_data
  redis_data:
    name: chatcenter_redis_data
  chatwoot_storage:
    name: chatcenter_chatwoot_storage
  certbot_webroot:
    name: chatcenter_certbot_webroot
    external: true
  certbot_certs:
    name: chatcenter_certbot_certs
    external: true

networks:
  chatcenter:
    name: chatcenter_net
    driver: bridge
