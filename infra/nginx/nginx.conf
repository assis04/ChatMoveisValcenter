worker_processes auto;
worker_rlimit_nofile 8192;

events {
  worker_connections 2048;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ─── Performance ──────────────────────────────────────────────
  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  client_max_body_size 50M;

  # Chatwoot/Evolution usam headers com underscore (api_access_token)
  underscores_in_headers on;

  # ─── Gzip ────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 4;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

  # ─── Security headers ────────────────────────────────────────
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # ─── Rate limiting ───────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=webhooks:10m rate=60r/s;

  # ─── Upstreams ───────────────────────────────────────────────
  upstream chatwoot {
    server chatwoot-web:3000;
  }

  upstream app {
    server app:3001;
  }

  upstream evolution {
    server evolution:8080;
  }

  # ─── HTTP → HTTPS redirect ──────────────────────────────────
  server {
    listen 80;
    server_name chat.moveisvalcenter.com.br;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ─── HTTPS ───────────────────────────────────────────────────
  server {
    listen 443 ssl;
    http2 on;
    server_name chat.moveisvalcenter.com.br;

    # SSL certificates
    ssl_certificate     /etc/letsencrypt/live/chat.moveisvalcenter.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.moveisvalcenter.com.br/privkey.pem;

    # SSL config
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ─── Next.js Dashboard App (iframe no Chatwoot) ────────────
    location /ext/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://app;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Next.js API (webhooks) ────────────────────────────────
    location /ext/api/webhooks/ {
      limit_req zone=webhooks burst=40 nodelay;
      proxy_pass http://app;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Evolution API (admin only) ────────────────────────────
    location /evolution/ {
      limit_req zone=api burst=10 nodelay;
      proxy_pass http://evolution/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Rewrite asset paths for Evolution Manager
      sub_filter_types text/html application/javascript;
      sub_filter_once off;
      sub_filter 'src="/assets/' 'src="/evolution/assets/';
      sub_filter 'href="/assets/' 'href="/evolution/assets/';
      sub_filter '"/manager' '"/evolution/manager';
    }

    # ─── Chatwoot WebSocket ────────────────────────────────────
    location /cable {
      proxy_pass http://chatwoot;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Chatwoot (tudo mais) ──────────────────────────────────
    location / {
      proxy_pass http://chatwoot;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
