# Adding a new operator:
#   1. They run `age-keygen -o ~/.config/sops/age/keys.txt` locally.
#   2. Append their public key to each `age:` block (comma-separated).
#   3. Re-encrypt the existing files: `sops updatekeys secrets/*.enc.yaml`.
#   4. Open a PR with the updated `.sops.yaml` and re-encrypted files.
